openapi: 3.0.3
info:
  title: KidWatch2 Guardian API
  description: API endpoints for Guardian authentication and student/progress data access using Laravel Sanctum.
  version: 1.1.0
servers:
  - url: http://127.0.0.1:8000/api/v1
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Guardian:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        first_name: { type: string }
        middle_name: { type: string, nullable: true }
        last_name: { type: string }
        relationship_to_child: { type: string }
    Student:
      type: object
      properties:
        id: { type: integer }
        guardian_id: { type: integer }
        first_name: { type: string }
        middle_name: { type: string, nullable: true }
        last_name: { type: string }
        sex: { type: string, enum: [Male, Female] }
        date_of_birth: { type: string, format: date }
        handedness: { type: string, enum: [right, left, both, not_yet_established] }
    ProgressRecord:
      type: object
      properties:
        id: { type: integer }
        student_id: { type: integer }
        teacher_id: { type: integer }
        assessment_date: { type: string, format: date }
        assessment_number: { type: integer }
        status: { type: string, enum: [evaluation_pending, evaluation_completed, assessment_completed] }
        domains:
          type: array
          items: { $ref: '#/components/schemas/Domain' }
        domain_scores:
          type: array
          items: { $ref: '#/components/schemas/DomainScore' }
    Domain:
      type: object
      properties:
        id: { type: integer }
        domain: { type: string }
        activity: { type: string }
        domain_results:
          type: array
          items: { $ref: '#/components/schemas/DomainResult' }
    DomainResult:
      type: object
      properties:
        id: { type: integer }
        present: { type: string, enum: [check, cross] }
        comments: { type: string }
    DomainScore:
      type: object
      properties:
        id: { type: integer }
        raw_score: { type: integer }
        scaled_score: { type: integer }
        sum_scaled_score: { type: integer }
        standard_score: { type: integer }
        child_age: { type: number, format: float }
        interpretation_code:
          type: string
          enum: [monitor_3m, monitor_6m, average, slightly_advanced, highly_advanced]

security:
  - bearerAuth: []

paths:
  /guardian/login:
    post:
      summary: Guardian Login
      description: Authenticate a guardian and return a Sanctum token.
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: "ischowalter@example.net"
              password: "Password123@"
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  guardian: { $ref: '#/components/schemas/Guardian' }
        '401': { description: Invalid credentials }
        '403': { description: Unauthorized (not a guardian) }

  /guardian/logout:
    post:
      summary: Guardian Logout
      description: Logout the guardian by deleting the current token.
      security: [ { bearerAuth: [] } ]
      responses:
        '200': { description: Logged out successfully }
        '401': { description: No active session }

  /guardian/logout-all:
    post:
      summary: Guardian Logout All
      description: Logout the guardian from all devices by deleting all tokens.
      security: [ { bearerAuth: [] } ]
      responses:
        '200': { description: Logged out from all devices }
        '401': { description: No active session }

  /guardian/profile:
    get:
      summary: Guardian Profile
      description: Retrieve the guardian’s profile information.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: Guardian profile returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Guardian' }
        '401': { description: Unauthorized }

  /guardian/students:
    get:
      summary: Guardian Students
      description: Retrieve all students linked to the guardian.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Student' }
        '401': { description: Unauthorized }

  /guardian/students/{id}:
    get:
      summary: Guardian Student Details
      description: Retrieve details of a specific student by ID.
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Student details returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Student' }
        '401': { description: Unauthorized }
        '404': { description: Student not found }

  /guardian/views:
    get:
      summary: Guardian Views
      description: Retrieve guardian profile, students, and related progress records/domains/scores in one response.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: Consolidated guardian views returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile: { $ref: '#/components/schemas/Guardian' }
                  students:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Student'
                        - type: object
                          properties:
                            progress_records:
                              type: array
                              items: { $ref: '#/components/schemas/ProgressRecord' }
        '401': { description: Unauthorized }
